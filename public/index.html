<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PDF Summarizer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div id="app" v-cloak>
      <div class="bg-orb orb-1"></div>
      <div class="bg-orb orb-2"></div>

      <header class="topbar container">
        <div class="brand">PDF Summarizer</div>
        <div class="topbar-actions">
          <button class="theme-toggle" @click="toggleTheme" :aria-label="isDark ? 'Switch to light mode' : 'Switch to dark mode'">
            <span class="theme-icon" v-if="isDark" aria-hidden="true">☀</span>
            <span class="theme-icon" v-else aria-hidden="true">☾</span>
          </button>
        </div>
      </header>

      <main class="container hero-wrap">
        <section class="hero">
          <p class="hero-tag">Local AI Workflow</p>
          <h1>PDF Summarizer:<br />Summarize Any PDF</h1>
          <p class="hero-sub">Upload a PDF and let AI summarize thousands of pages in seconds.</p>
        </section>

        <section id="summarize" class="panel">
          <div class="panel-head">
            <h2>Summarize a PDF</h2>
            <p>Runs fully local with Ollama + mistral.</p>
          </div>

          <form class="upload-form" @submit.prevent="summarizePdf">
            <label class="file-input-wrap" :class="{ disabled: loading }">
              <input type="file" accept=".pdf,application/pdf" @change="handleFileChange" :disabled="loading" />
              <div class="file-input-ui">
                <span class="file-title">{{ selectedFile ? selectedFile.name : 'Choose PDF file' }}</span>
                <span class="file-hint">Max 25MB</span>
              </div>
            </label>

            <button class="cta" type="submit" :disabled="loading || !selectedFile">
              <span v-if="loading">Summarizing...</span>
              <span v-else>Generate Summary</span>
            </button>
          </form>

          <p v-if="error" class="status error">{{ error }}</p>
          <p v-if="successMessage" class="status success">{{ successMessage }}</p>

          <section v-if="summary" class="result">
            <div class="result-head">
              <h3>Summary Output</h3>
              <button class="ghost" @click="downloadSummary" :disabled="!summary">Download</button>
            </div>
            <pre>{{ summary }}</pre>
          </section>
        </section>
      </main>
    </div>

    <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
    <script src="/app.js"></script>
  </body>
</html>
